<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SUSHI MAMA MENU</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #121212; color: white; margin: 0; padding-bottom: 100px; }
        .header { text-align: center; padding: 15px; background: #1e1e1e; border-bottom: 2px solid #e67e22; }
        .tabs { display: flex; justify-content: space-around; background: #1e1e1e; position: sticky; top: 0; z-index: 10; padding: 10px 0; }
        .tab { color: #888; cursor: pointer; padding: 8px 15px; border-radius: 20px; font-weight: bold; }
        .tab.active { background: #e67e22; color: white; }
        .container { padding: 15px; display: none; }
        .container.active { display: block; }
        .card { background: #1e1e1e; border-radius: 12px; padding: 10px; margin-bottom: 12px; display: flex; align-items: center; border: 1px solid #333; }
        .card img { width: 70px; height: 70px; border-radius: 10px; object-fit: cover; margin-right: 12px; background: #333; }
        .info { flex-grow: 1; }
        .info b { display: block; font-size: 1.05em; }
        .price { color: #e67e22; font-weight: bold; margin-top: 5px; }
        .add-btn { background: #e67e22; color: white; border: none; border-radius: 8px; padding: 8px 15px; cursor: pointer; font-weight: bold; }
        .cart-count { background: #e67e22; color: white; border-radius: 50%; padding: 2px 7px; font-size: 0.8em; margin-left: 5px; display: none; }
    </style>
</head>
<body>

<div class="header"><h2>🍣 SUSHI MAMA</h2></div>
<div class="tabs">
    <div class="tab active" onclick="openTab(event, 'sushi')">Суші</div>
    <div class="tab" onclick="openTab(event, 'pizza')">Піца</div>
    <div class="tab" onclick="openTab(event, 'drinks')">Напої</div>
</div>

<div id="sushi" class="container active">
    <div class="card"><img src="kalifor_krab.jpg"><div class="info"><b>Каліфорнія краб</b><div class="price">105 грн</div></div><button class="add-btn" onclick="addToCart('Каліфорнія краб', 105)">+</button></div>
    <div class="card"><img src="sur_filadelf.jpg"><div class="info"><b>Італійський рол</b><span>з креветкою</span><div class="price">225 грн</div></div><button class="add-btn" onclick="addToCart('Італійський рол', 225)">+</button></div>
</div>

<div id="pizza" class="container">
    <div class="card"><img src="four_cheese.jpg"><div class="info"><b>4 Сири</b><div class="price">325 грн</div></div><button class="add-btn" onclick="addToCart('Піца 4 Сири', 325)">+</button></div>
    <div class="card"><img src="napoli.jpg"><div class="info"><b>Наполі</b><div class="price">265 грн</div></div><button class="add-btn" onclick="addToCart('Піца Наполі', 265)">+</button></div>
</div>

<div id="drinks" class="container">
    <div class="card"><div class="info"><b>Coca-Cola 250ml</b><div class="price">25 грн</div></div><button class="add-btn" onclick="addToCart('Кола 0.25', 25)">+</button></div>
    <div class="card"><div class="info"><b>Coca-Cola 0.5L</b><div class="price">40 грн</div></div><button class="add-btn" onclick="addToCart('Кола 0.5', 40)">+</button></div>
    <div class="card"><div class="info"><b>Coca-Cola 1L</b><div class="price">55 грн</div></div><button class="add-btn" onclick="addToCart('Кола 1Л', 55)">+</button></div>
    <div class="card"><div class="info"><b>Coca-Cola 1.75L</b><div class="price">75 грн</div></div><button class="add-btn" onclick="addToCart('Кола 1.75Л', 75)">+</button></div>
</div>

<script>
    let tg = window.Telegram.WebApp;
    tg.expand();
    let cart = {};

    function openTab(evt, tabName) {
        let containers = document.getElementsByClassName("container");
        for (let c of containers) c.classList.remove("active");
        let tabs = document.getElementsByClassName("tab");
        for (let t of tabs) t.classList.remove("active");
        document.getElementById(tabName).classList.add("active");
        evt.currentTarget.classList.add("active");
    }

    function addToCart(name, price) {
        if (cart[name]) {
            cart[name].count++;
        } else {
            cart[name] = { price: price, count: 1 };
        }
        updateMainButton();
    }

    function updateMainButton() {
        let total = 0;
        let count = 0;
        for (let id in cart) {
            total += cart[id].price * cart[id].count;
            count += cart[id].count;
        }

        if (total > 0) {
            tg.MainButton.setText(`КОШИК: ${total} грн (${count} шт)`);
            tg.MainButton.show();
        } else {
            tg.MainButton.hide();
        }
    }

    tg.onEvent('mainButtonClicked', function() {
        let orderData = {
            items: cart,
            total: Object.values(cart).reduce((a, b) => a + (b.price * b.count), 0)
        };
        tg.sendData(JSON.stringify(orderData));
    });
</script>
</body>
</html>
