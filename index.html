<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sushi Mama Menu</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; margin: 0; padding: 10px; }
        .item { background: white; border-radius: 10px; padding: 15px; margin-bottom: 10px; display: flex; justify-content: space-between; }
        button { background: #e67e22; color: white; border: none; border-radius: 5px; padding: 5px 15px; }
    </style>
</head>
<body>
    <h3>🍣 Наше Меню</h3>
    <div class="item">
        <span>Сет "Філадельфія" <br><b>499 грн</b></span>
        <button onclick="addItem()">Додати</button>
    </div>
    <div class="item">
        <span>Рол "Каліфорнія" <br><b>250 грн</b></span>
        <button onclick="addItem()">Додати</button>
    </div>
</body>
<script>
    let tg = window.Telegram.WebApp;
    tg.expand(); // Розгорнути на весь екран

    function addItem() {
        tg.MainButton.setText("ПЕРЕЙТИ ДО КОШИКА");
        tg.MainButton.show();
    }
</script>
</html>
